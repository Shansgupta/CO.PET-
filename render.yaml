services:
  - type: web
    name: copet-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: Pet Lending MVP API
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB
        value: pet_lending_mvp
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: BORROWER_COMMISSION_RATE
        value: "0.10"
      - key: LENDER_COMMISSION_RATE
        value: "0.05"
      - key: CORS_ORIGINS
        value: https://co-pet.vercel.app/login,http://localhost:3000
